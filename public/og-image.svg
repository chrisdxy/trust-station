<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d4a6f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0b429"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 装饰圆 -->
  <circle cx="100" cy="100" r="200" fill="rgba(240,180,41,0.05)"/>
  <circle cx="1100" cy="530" r="250" fill="rgba(255,255,255,0.03)"/>
  
  <!-- Logo 圆形 -->
  <circle cx="600" cy="220" r="70" fill="url(#accent)"/>
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#1e3a5f" text-anchor="middle">正</text>
  
  <!-- 标题 -->
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#f0b429" text-anchor="middle">正道驿站</text>
  <text x="600" y="390" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">Trust Station</text>
  
  <!-- 分割线 -->
  <line x1="400" y1="420" x2="800" y2="420" stroke="rgba(240,180,41,0.3)" stroke-width="1"/>
  
  <!-- 标语 -->
  <text x="600" y="460" font-family="Arial, sans-serif" font-size="18" fill="#cbd5e1" text-anchor="middle">全球商业信任共建社区</text>
  <text x="600" y="490" font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">让合作有迹可循 · 让成长和信任在真实交往中沉淀</text>
</svg>
